name: Build deb packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Prepare Theos cache key
        run: |
          theos_head=$(git ls-remote https://github.com/roothide/theos | head -n 1 | cut -f 1)
          sdks_head=$(git ls-remote https://github.com/theos/sdks | head -n 1 | cut -f 1)
          echo "upstream_heads=${theos_head}-${sdks_head}" >> "$GITHUB_ENV"

      - name: Restore Theos cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-${{ env.upstream_heads }}

      - name: Prepare Theos
        uses: huami1314/theos-action@main

      - name: Set up GNU Make
        run: echo "$(brew --prefix)/opt/make/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Prepare output directory
        run: |
          rm -rf packages build-packages
          mkdir -p build-packages

      - name: Build rootful package
        run: |
          make clean
          rm -rf packages
          make package FINALPACKAGE=1 INSTALL=0 ARCHS="arm64 arm64e" THEOS_PACKAGE_ARCH=iphoneos-arm -j"$(sysctl -n hw.ncpu)"
          deb=$(find packages -maxdepth 1 -type f -name '*.deb' -print -quit)
          test -n "$deb"
          mv "$deb" "build-packages/$(basename "${deb%.deb}")-rootful.deb"

      - name: Build rootless package
        run: |
          make clean
          rm -rf packages
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 INSTALL=0 ARCHS="arm64 arm64e" -j"$(sysctl -n hw.ncpu)"
          deb=$(find packages -maxdepth 1 -type f -name '*.deb' -print -quit)
          test -n "$deb"
          mv "$deb" "build-packages/$(basename "${deb%.deb}")-rootless.deb"

      - name: Build roothide package
        run: |
          make clean
          rm -rf packages
          make package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 INSTALL=0 ARCHS="arm64 arm64e" -j"$(sysctl -n hw.ncpu)"
          deb=$(find packages -maxdepth 1 -type f -name '*.deb' -print -quit)
          test -n "$deb"
          mv "$deb" "build-packages/$(basename "${deb%.deb}")-roothide.deb"

      - name: Verify packages
        run: |
          test "$(find build-packages -maxdepth 1 -type f -name '*.deb' | wc -l | tr -d ' ')" = "3"
          ls -lh build-packages

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: AWECommentAudioTweak
          path: build-packages/*.deb
          if-no-files-found: error
